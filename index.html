<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Generator</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="icon" type="image/jpg" href="favicon.jpg" sizes="32x32">
<link rel="apple-touch-icon" href="favicon.jpg">
  </head>
  <body>
    <main>
      <h1>Generate a <span class="green">random password</span></h1>
      <p>Never use an insecure password again.</p>

      <fieldset title="select how your password should look like">
        <legend>Show Me:</legend>
        <label><input type="checkbox" id="lowercase" checked /> Lower Case</label>
        <label><input type="checkbox" id="uppercase" checked /> Upper Case</label>
        <label><input type="checkbox" id="numbers" checked /> Numbers</label>
        <label><input type="checkbox" id="symbols" checked /> Symbols</label>
      </fieldset>

      <div class="controls">
        <input
          class="num-select"
          type="number"
          id="numChoosen"
          value="12"
          min="8"
          max="22"
          placeholder="Length"
        />
        <button onclick="generatePass()">Generate passwords</button>
      </div>

      <div id="error-msg" class="error"></div>

      <div class="line"></div>

      <div class="pass-div" id="pass-div">
        <span title="Click to copy" class="pass-field" id="pass1" onclick="copyText1()"></span>
        <span title="Click to copy" class="pass-field" id="pass2" onclick="copyText2()"></span>
      </div>

         <!-- New How to Use Section -->
      <div class="line"></div>
      <div class="how-to-use">
        <strong>How to use:</strong><br>
        1. Choose character types<br>
        2. Set length (8–22)<br>
        3. Click <strong>Generate passwords</strong><br>
        4. Tap any password to copy
      </div>
    </main>

    <script src="characters.js"></script>
  </body>
</html>
